name: Archive build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "Archive-build"
  # Eğer yeni bir derleme gelirse eskisini iptal etme (Hata almamak için false yaptık)
  cancel-in-progress: false 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: current
        # Derlemeyi hızlandırmak için önbelleği açıyoruz
        cache-read-only: false

    - name: Run Gradle Build
      # --no-daemon ve clean ekleyerek bellek hatalarının önüne geçiyoruz
      run: ./gradlew clean assembleDebug --no-daemon --stacktrace
      env:
        # Gradle'a daha fazla RAM veriyoruz ki JNI birleştirmede çökmesin
        GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
        SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        MDL_API_KEY: ${{ secrets.MDL_API_KEY }}

    - name: Find APK Path
      run: find app/build/outputs/apk/ -name "*.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudStream-Debug-APK
        # APK yolunu garantiye alıyoruz
        path: app/build/outputs/apk/**/*.apk
        if-no-files-found: error
