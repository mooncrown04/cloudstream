name: Archive build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '*.md'
      - '*.json'
      - '**/wcokey.txt'
  workflow_dispatch:

# Node.js 24 uyarısını susturmak için opsiyonel env
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "Archive-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Apply Actor Search Patch
      run: python patch_code.py

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Run Gradle Build
      run: ./gradlew assembleDebug
      env:
        SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        MDL_API_KEY: ${{ secrets.MDL_API_KEY }}

    # Üretilen APK'nın yerini kesin olarak bulmak için bu adımı ekledik
    - name: Find APK Path
      run: find app/build/outputs/apk/ -name "*.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudStream-Debug-APK
        # 'debug/*.apk' yerine '**/*.apk' kullanarak tüm alt klasörleri tarıyoruz
        path: "app/build/outputs/apk/**/*.apk"
