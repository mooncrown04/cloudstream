name: Archive build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '*.md'
      - '*.json'
      - '**/wcokey.txt'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: "Archive-build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # ÖNEMLİ: Yazma izni vermeliyiz
      contents: write
      
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Tüm geçmişi çekmek push işlemini kolaylaştırır

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Apply Actor Search Patch
      run: python patch_code.py
      
    - name: Apply Player and Live TV Patch
      run: python player_live_patch.py

    # --- YENİ ADIM: DEĞİŞİKLİKLERİ GİTHUB'A KAYDET ---
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        # Eğer değişiklik yoksa hata vermemesi için || true ekliyoruz
        git commit -m "Otomatik Oyuncu ve Canlı TV yaması uygulandı" || echo "Değişiklik yok"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/java-setup@v4 # Düzeltme: setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Run Gradle Build
      run: ./gradlew assembleDebug
      env:
        SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        MDL_API_KEY: ${{ secrets.MDL_API_KEY }}

    - name: Find APK Path
      run: find app/build/outputs/apk/ -name "*.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudStream-Debug-APK
        path: "app/build/outputs/apk/**/*.apk"
