name: Archive build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Dosyaları kalıcı olarak değiştirebilmesi için yazma izni şart
    permissions:
      contents: write
      
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Apply Actor Search Patch
      run: python patch_code.py
      
    - name: Apply Player and Live TV Patch
      run: python player_live_patch.py

    # Bu adım sayesinde değişiklikleri "Code" sekmesinde görebileceksin
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Otomatik yama uygulandı: Player ve Live TV" || echo "Değişiklik yok"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4 # HATA BURADAYDI, DÜZELTİLDİ
      with:
        distribution: temurin
        java-version: 17

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Run Gradle Build
      run: ./gradlew assembleDebug
      env:
        SIMKL_CLIENT_ID: ${{ secrets.SIMKL_CLIENT_ID }}
        SIMKL_CLIENT_SECRET: ${{ secrets.SIMKL_CLIENT_SECRET }}
        MDL_API_KEY: ${{ secrets.MDL_API_KEY }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CloudStream-Debug-APK
        path: "app/build/outputs/apk/**/*.apk"
