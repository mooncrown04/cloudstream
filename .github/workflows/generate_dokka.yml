name: Dokka (Fork-Friendly)

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '*.md'
  workflow_dispatch:

concurrency:
  group: "dokka"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Generate Dokka
        run: |
          chmod +x gradlew
          ./gradlew :docs:dokkaGeneratePublicationHtml || ./gradlew dokkaHtml
        # Not: Bazı projelerde komut farklı olabilir, hata verirse gradlew yanındaki komutu kontrol et.

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudStream-Documentation
          path: |
            docs/build/dokka/html/
            app/build/dokka/html/
            build/dokka/html/
