name: Dokka (Sadece Derleme)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Dokka
        run: |
          chmod +x gradlew
          ./gradlew docs:dokkaGeneratePublicationHtml

      # Buradan sonrası dışarıya veri gönderdiği için silindi. 
      # Dokümanları görmek istersen Artifact olarak yükleyebiliriz:
      - name: Upload Dokka Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dokka-HTML
          path: docs/build/dokka/html/*
