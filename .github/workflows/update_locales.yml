name: Fix locale issues (Fork-Friendly)

on:
  push:
    branches: [ master ]
    paths:
      - '**.xml'
  workflow_dispatch:

concurrency:
  group: "locale"
  cancel-in-progress: true

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # Kendi depona yazma yetkisi için varsayılan tokenı kullanıyoruz
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip3 install lxml requests

    - name: Edit files
      run: |
        # Eğer locales.py dosyası deponda varsa çalıştırır
        if [ -f .github/locales.py ]; then
          python3 .github/locales.py
        else
          echo "locales.py bulunamadı, bu adım atlanıyor."
        fi

    - name: Commit to the repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        # Eğer bir değişiklik varsa commit yap ve pushla
        if ! git diff-index --quiet HEAD; then
          git commit -m 'chore(locales): fix locale issues'
          git push
        else
          echo "Değişiklik yok, push atlanıyor."
        fi
