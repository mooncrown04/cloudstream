name: "Kod Yamalarını Kalıcı Uygula ve Raporla"

on:
  workflow_dispatch:

jobs:
  apply-patches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Yamaları Çalıştır
        run: |
          # patch_code.py varsa çalıştır
          [ -f patch_code.py ] && python patch_code.py || echo "patch_code.py yok"
          # player_live_patch.py çalıştır ve Z raporu oluştur
          python player_live_patch.py

      - name: Değişiklikleri ve Z Raporunu Kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "⚙️ Otomatik Yama ve Z Raporu" || echo "Değişiklik yok"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
